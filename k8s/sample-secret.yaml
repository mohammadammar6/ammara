apiVersion: v1
kind: Secret
metadata:
  name: ammara-secrets
type: Opaque
stringData:
  # MySQL root password used by the app (key expected by deployments)
  mysql-root-password: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
type: Opaque
stringData:
  # MySQL root password used by the MySQL pod
  mysql-root-password: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: ammara-db-secret
  namespace: default
type: Opaque
stringData:
  # Database connection creds
  DB_USER: "root"
  DB_PASSWORD: ""

  # Optional app-level root login (if your app uses these env names)
  ROOT_USER: "root"
  ROOT_PASSWORD: ""
